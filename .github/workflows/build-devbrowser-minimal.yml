# DevBrowser - Based on Kiwi Browser CI

name: DevBrowser Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Free Space
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /home/runner/.cache
          
      - name: Install Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 openjdk-11-jdk-headless ccache ninja-build \
            libc6-dev-i386 lib32stdc++6 libnss3-dev libssl-dev libgbm-dev \
            libxcomposite-dev libxdamage-dev libxrandr-dev libpci-dev libxkbcommon-dev \
            libasound2-dev libxshmfence-dev libdrm-dev
            
      - name: Checkout CIPD
        uses: actions/checkout@v4
        with:
          repository: kiwibrowser/dependencies
          path: ./.cipd
          
      - name: Link CIPD
        run: |
          ln -s $GITHUB_WORKSPACE/./.cipd ..
          cp ../.cipd/.gclient ..
          cp ../.cipd/.gclient_entries ..
          
      - name: Create directories
        run: |
          mkdir -p secondary_disk/.ccache
          mkdir -p secondary_disk/out/android_arm64
          
      - name: Sync deps
        run: |
          export PATH="$GITHUB_WORKSPACE/depot_tools:$PATH"
          gclient sync -D --nohooks --no-history 2>&1 | tail -20
          
      - name: Configure
        run: |
          mkdir -p out/android_arm64
          printf 'target_os = "android"\ntarget_cpu = "arm64"\nis_debug = false\nis_official_build = true\nandroid_channel = "stable"\ndcheck_always_on = false\nsymbol_level = 0\n' > out/android_arm64/args.gn
          export PATH="$GITHUB_WORKSPACE/depot_tools:$PATH"
          gn gen out/android_arm64
          
      - name: Build
        run: |
          export PATH="$GITHUB_WORKSPACE/depot_tools:$PATH"
          export CCACHE_DIR=$GITHUB_WORKSPACE/secondary_disk/.ccache
          ccache -M 10G
          ccache -z
          ninja -C out/android_arm64 -j$(nproc) -l$(nproc) chrome_android_apk 2>&1 | tail -50
          ccache -s
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: devbrowser-arm64
          path: out/android_arm64/*.apk
          retention-days: 7

